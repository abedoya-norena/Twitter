{% extends 'base.html' %}
{% block content %}

<h2>{{ t.change_pw_title }}</h2>

{% if success %}
<div class="alert alert-success">&#10003; Password updated successfully.</div>
{% endif %}

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="form-box">
  <form method="post" action="/change_password">
    <div class="form-group">
      <label for="old_password">{{ t.lbl_old_pw }}</label>
      <input type="password" id="old_password" name="old_password" placeholder="••••••••" required>
    </div>
    <div class="form-group">
      <label for="new_password">{{ t.lbl_new_pw }}</label>
      <input type="password" id="new_password" name="new_password" placeholder="••••••••" required>
    </div>
    <div class="form-group">
      <label for="new_password2">{{ t.lbl_confirm_new_pw }}</label>
      <input type="password" id="new_password2" name="new_password2" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">{{ t.btn_update_pw }}</button>
  </form>
</div>

{% endblock %}
