<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroPulse</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>Neuro<span style="-webkit-text-fill-color:var(--cyan)">Pulse</span><span class="dot">▮</span></h1>
  <nav>
    <a href="/">Feed</a>
    {% if username %}
    <a href="/create_message">Tweet</a>
    <a href="/logout">Logout</a>
    <span class="session-badge">⬡ {{ username }}</span>
    {% else %}
    <a href="/login">Login</a>
    <a href="/create_user">Register</a>
    {% endif %}
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>NeuroPulse &mdash; synaptic social network &mdash; nodes online</footer>

</body>
</html>
