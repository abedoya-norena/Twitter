{% extends 'base.html' %}
{% block content %}

<h2>{{ t.tweet_title }}</h2>

{% if not username %}
<div class="alert alert-error">You must be <a href="/login" style="color:var(--cyan)">logged in</a> to tweet.</div>
{% else %}

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="form-box">
  <form method="post" action="/create_message">
    <div class="form-group">
      <label for="message">{{ t.lbl_message }} <span style="color:var(--muted)">{{ t.lbl_message_hint }}</span></label>
      <textarea id="message" name="message" placeholder="Share a thought..." required></textarea>
    </div>
    <button type="submit" class="btn">{{ t.btn_transmit }}</button>
  </form>
</div>

{% endif %}

{% endblock %}
