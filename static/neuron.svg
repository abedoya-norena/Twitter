<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <!-- fMRI activation colormap gradients (hot colormap) -->
    <radialGradient id="g-peak" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="12%"  stop-color="#fffb00" stop-opacity="0.88"/>
      <stop offset="38%"  stop-color="#ff6d00" stop-opacity="0.72"/>
      <stop offset="72%"  stop-color="#c1121f" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6a040f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-high" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff8c00" stop-opacity="0.88"/>
      <stop offset="42%"  stop-color="#c1121f" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#6a040f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-mid" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e85d04" stop-opacity="0.78"/>
      <stop offset="55%"  stop-color="#9d0208" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6a040f" stop-opacity="0"/>
    </radialGradient>
    <!-- Deactivation cluster (cool blue) -->
    <radialGradient id="g-cool" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#90e0ef" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#0077b6" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#03045e" stop-opacity="0"/>
    </radialGradient>
    <!-- t-value colorbar -->
    <linearGradient id="colorbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="12%"  stop-color="#fffb00"/>
      <stop offset="32%"  stop-color="#ff6d00"/>
      <stop offset="58%"  stop-color="#c1121f"/>
      <stop offset="82%"  stop-color="#6a040f"/>
      <stop offset="100%" stop-color="#140a1e"/>
    </linearGradient>
    <!-- Soft blur makes BOLD blobs look like real smoothed fMRI data -->
    <filter id="bold-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="bold-blur-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- Scanner / MRI display background -->
  <rect width="900" height="200" fill="#04040b"/>

  <!-- Very faint coordinate grid -->
  <line x1="0"   y1="100" x2="900" y2="100" stroke="#0d0b1f" stroke-width="0.8"/>
  <line x1="390" y1="0"   x2="390" y2="200" stroke="#0d0b1f" stroke-width="0.8"/>

  <!-- Brain tissue: axial slice (top-down view) -->
  <!-- Outer cortex / dura -->
  <ellipse cx="390" cy="100" rx="240" ry="84"
           fill="#0e0d1f" stroke="#1a1730" stroke-width="1.5"/>
  <!-- White matter -->
  <ellipse cx="390" cy="100" rx="190" ry="64"
           fill="#0b0a18" stroke="#131126" stroke-width="1"/>
  <!-- Lateral ventricles (dark CSF spaces) -->
  <ellipse cx="362" cy="94"  rx="30" ry="13" fill="#030308"
           stroke="#0c0b17" stroke-width="0.5" transform="rotate(-12 362 94)"/>
  <ellipse cx="418" cy="94"  rx="30" ry="13" fill="#030308"
           stroke="#0c0b17" stroke-width="0.5" transform="rotate(12 418 94)"/>
  <!-- Third ventricle (midline) -->
  <rect x="385" y="88" width="10" height="24" rx="4"
        fill="#030308" stroke="#0c0b17" stroke-width="0.4"/>

  <!-- BOLD activation clusters (blurred for realism) -->

  <!-- vmPFC / medial OFC: peak value signal (yellow-white) -->
  <ellipse cx="390" cy="68" rx="46" ry="24" fill="url(#g-peak)" filter="url(#bold-blur)"/>

  <!-- Left lateral OFC -->
  <ellipse cx="312" cy="80" rx="32" ry="18" fill="url(#g-high)" filter="url(#bold-blur)"/>
  <!-- Right lateral OFC -->
  <ellipse cx="468" cy="80" rx="32" ry="18" fill="url(#g-high)" filter="url(#bold-blur)"/>

  <!-- Left caudate head / striatum (RPE signal) -->
  <ellipse cx="350" cy="98" rx="24" ry="15" fill="url(#g-high)" filter="url(#bold-blur-sm)"/>
  <!-- Right caudate head -->
  <ellipse cx="430" cy="98" rx="24" ry="15" fill="url(#g-high)" filter="url(#bold-blur-sm)"/>

  <!-- Left putamen -->
  <ellipse cx="298" cy="106" rx="19" ry="12" fill="url(#g-mid)" filter="url(#bold-blur-sm)"/>
  <!-- Right putamen -->
  <ellipse cx="482" cy="106" rx="19" ry="12" fill="url(#g-mid)" filter="url(#bold-blur-sm)"/>

  <!-- Posterior cingulate cortex (self-referential value) -->
  <ellipse cx="390" cy="126" rx="28" ry="16" fill="url(#g-mid)" filter="url(#bold-blur-sm)"/>

  <!-- Bilateral amygdala: deactivated in value > control contrast (cool blue) -->
  <ellipse cx="287" cy="120" rx="18" ry="11" fill="url(#g-cool)" filter="url(#bold-blur-sm)"/>
  <ellipse cx="493" cy="120" rx="18" ry="11" fill="url(#g-cool)" filter="url(#bold-blur-sm)"/>

  <!-- t-value colorbar -->
  <rect x="836" y="22" width="11" height="156" fill="url(#colorbar)" rx="2"/>
  <line x1="848" y1="22"  x2="854" y2="22"  stroke="#302c55" stroke-width="1"/>
  <text x="857" y="26"  fill="#302c55" font-size="8" font-family="monospace">t=10</text>
  <line x1="848" y1="61"  x2="854" y2="61"  stroke="#302c55" stroke-width="1"/>
  <text x="857" y="65"  fill="#302c55" font-size="8" font-family="monospace">t=7</text>
  <line x1="848" y1="100" x2="854" y2="100" stroke="#302c55" stroke-width="1"/>
  <text x="857" y="104" fill="#302c55" font-size="8" font-family="monospace">t=4</text>
  <line x1="848" y1="139" x2="854" y2="139" stroke="#302c55" stroke-width="1"/>
  <text x="857" y="143" fill="#302c55" font-size="8" font-family="monospace">t=2</text>
  <line x1="848" y1="178" x2="854" y2="178" stroke="#302c55" stroke-width="1"/>
  <text x="857" y="182" fill="#302c55" font-size="8" font-family="monospace">t=0</text>

  <!-- Hemisphere labels -->
  <text x="150" y="98"  text-anchor="middle" fill="#252244" font-size="10" font-family="monospace">L</text>
  <text x="630" y="98"  text-anchor="middle" fill="#252244" font-size="10" font-family="monospace">R</text>

  <!-- Crosshair at center -->
  <line x1="383" y1="100" x2="397" y2="100" stroke="#252244" stroke-width="0.9"/>
  <line x1="390" y1="93"  x2="390" y2="107" stroke="#252244" stroke-width="0.9"/>
  <circle cx="390" cy="100" r="4" fill="none" stroke="#252244" stroke-width="0.8"/>

  <!-- MNI coordinate label -->
  <text x="390" y="192" text-anchor="middle" fill="#252244" font-size="8" font-family="monospace">z = +8 mm  (MNI)</text>

  <!-- Annotation leader lines -->
  <line x1="390" y1="50"  x2="640" y2="18"  stroke="#22204a" stroke-width="0.8" stroke-dasharray="3,4"/>
  <text x="644" y="22"  fill="#38346a" font-size="8" font-family="monospace">vmPFC   t=9.4</text>

  <line x1="350" y1="90"  x2="640" y2="52"  stroke="#22204a" stroke-width="0.8" stroke-dasharray="3,4"/>
  <text x="644" y="56"  fill="#38346a" font-size="8" font-family="monospace">striatum  t=7.1</text>

  <line x1="287" y1="120" x2="100" y2="158" stroke="#22204a" stroke-width="0.8" stroke-dasharray="3,4"/>
  <text x="8"   y="162" fill="#38346a" font-size="8" font-family="monospace">amygdala  t=&#x2212;3.2</text>

  <line x1="390" y1="132" x2="640" y2="162" stroke="#22204a" stroke-width="0.8" stroke-dasharray="3,4"/>
  <text x="644" y="166" fill="#38346a" font-size="8" font-family="monospace">PCC   t=5.8</text>

  <!-- Contrast label -->
  <text x="390" y="12" text-anchor="middle" fill="#22204a"
        font-size="7.5" font-family="monospace" letter-spacing="2">
    VALUE &gt; CONTROL &#x2014; BOLD SIGNAL &#x2014; FWE p&lt;0.05 &#x2014; 200 PARTICIPANTS
  </text>
</svg>
