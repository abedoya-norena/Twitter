<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" style="background:#05050f">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff9f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff9f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- axon lines -->
  <line x1="80"  y1="90"  x2="200" y2="50"  stroke="#00e5ff" stroke-width="1"   stroke-opacity=".35"/>
  <line x1="80"  y1="90"  x2="200" y2="130" stroke="#00e5ff" stroke-width="1"   stroke-opacity=".35"/>
  <line x1="200" y1="50"  x2="340" y2="90"  stroke="#a855f7" stroke-width="1"   stroke-opacity=".35"/>
  <line x1="200" y1="130" x2="340" y2="90"  stroke="#a855f7" stroke-width="1"   stroke-opacity=".35"/>
  <line x1="340" y1="90"  x2="430" y2="40"  stroke="#00e5ff" stroke-width="1.2" stroke-opacity=".45"/>
  <line x1="340" y1="90"  x2="430" y2="140" stroke="#00e5ff" stroke-width="1.2" stroke-opacity=".45"/>
  <line x1="430" y1="40"  x2="560" y2="90"  stroke="#a855f7" stroke-width="1"   stroke-opacity=".4"/>
  <line x1="430" y1="140" x2="560" y2="90"  stroke="#a855f7" stroke-width="1"   stroke-opacity=".4"/>
  <line x1="560" y1="90"  x2="680" y2="50"  stroke="#00ff9f" stroke-width="1"   stroke-opacity=".4"/>
  <line x1="560" y1="90"  x2="680" y2="130" stroke="#00ff9f" stroke-width="1"   stroke-opacity=".4"/>
  <line x1="680" y1="50"  x2="780" y2="90"  stroke="#00e5ff" stroke-width="1"   stroke-opacity=".35"/>
  <line x1="680" y1="130" x2="780" y2="90"  stroke="#00e5ff" stroke-width="1"   stroke-opacity=".35"/>

  <!-- extra dendrites -->
  <line x1="80"  y1="90"  x2="30"  y2="60"  stroke="#a855f7" stroke-width=".8" stroke-opacity=".3"/>
  <line x1="80"  y1="90"  x2="30"  y2="120" stroke="#a855f7" stroke-width=".8" stroke-opacity=".3"/>
  <line x1="780" y1="90"  x2="840" y2="55"  stroke="#00ff9f" stroke-width=".8" stroke-opacity=".3"/>
  <line x1="780" y1="90"  x2="840" y2="125" stroke="#00ff9f" stroke-width=".8" stroke-opacity=".3"/>
  <line x1="340" y1="90"  x2="300" y2="20"  stroke="#ff4dff" stroke-width=".8" stroke-opacity=".25"/>
  <line x1="560" y1="90"  x2="600" y2="20"  stroke="#ff4dff" stroke-width=".8" stroke-opacity=".25"/>

  <!-- soma (cell bodies) -->
  <circle cx="80"  cy="90"  r="12" fill="url(#g2)" filter="url(#glow)"/>
  <circle cx="80"  cy="90"  r="5"  fill="#a855f7"/>

  <circle cx="200" cy="50"  r="9"  fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="200" cy="50"  r="4"  fill="#00e5ff"/>
  <circle cx="200" cy="130" r="9"  fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="200" cy="130" r="4"  fill="#00e5ff"/>

  <circle cx="340" cy="90"  r="14" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="340" cy="90"  r="6"  fill="#00e5ff"/>

  <circle cx="430" cy="40"  r="8"  fill="url(#g2)" filter="url(#glow)"/>
  <circle cx="430" cy="40"  r="3.5" fill="#a855f7"/>
  <circle cx="430" cy="140" r="8"  fill="url(#g2)" filter="url(#glow)"/>
  <circle cx="430" cy="140" r="3.5" fill="#a855f7"/>

  <circle cx="560" cy="90"  r="14" fill="url(#g3)" filter="url(#glow)"/>
  <circle cx="560" cy="90"  r="6"  fill="#00ff9f"/>

  <circle cx="680" cy="50"  r="9"  fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="680" cy="50"  r="4"  fill="#00e5ff"/>
  <circle cx="680" cy="130" r="9"  fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="680" cy="130" r="4"  fill="#00e5ff"/>

  <circle cx="780" cy="90"  r="12" fill="url(#g2)" filter="url(#glow)"/>
  <circle cx="780" cy="90"  r="5"  fill="#a855f7"/>

  <!-- label -->
  <text x="430" y="170" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#5a607f" letter-spacing="4">NEURAL NETWORK</text>
</svg>
